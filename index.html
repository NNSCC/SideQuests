<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f9fafb; color: #111827; }
        .hidden { display: none; }
        .quest-card { background: white; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .quest-card:hover { border-color: #6366f1; transform: translateY(-2px); }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <button id="navCreateBtn" class="text-indigo-600 font-bold hover:text-indigo-800">+ Create Side Quest</button>
        <h1 class="text-xl font-black tracking-tighter">SIDE QUEST</h1>
        <div id="authSection">
            <button id="loginBtn" class="bg-black text-white px-4 py-2 rounded-full text-sm font-medium">Log In</button>
        </div>
    </nav>

    <main id="viewFeed" class="max-w-2xl mx-auto py-8 px-4">
        <div id="questContainer" class="space-y-6">
            </div>
    </main>

    <section id="viewCreate" class="hidden fixed inset-0 z-[60] bg-white p-8 overflow-y-auto">
        <div class="max-w-xl mx-auto">
            <button id="closeCreateBtn" class="mb-8 text-gray-500">← Back to Feed</button>
            <h2 class="text-3xl font-bold mb-6">New Quest</h2>
            
            <div class="space-y-4">
                <input type="text" id="qTitle" placeholder="Quest Title" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                <textarea id="qDesc" placeholder="Description..." class="w-full p-4 border rounded-xl h-32 focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                
                <div class="flex items-center gap-4 py-2">
                    <label class="flex items-center gap-2">
                        <input type="radio" name="visibility" value="public" checked> Public
                    </label>
                    <label class="flex items-center gap-2">
                        <input type="radio" name="visibility" value="private"> Private (Me only)
                    </label>
                </div>

                <button id="publishBtn" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-indigo-200">Publish Quest</button>
                <p class="text-xs text-center text-gray-400">Note: Published quests cannot be deleted.</p>
            </div>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // --- 1. CONFIG (PASTE YOURS HERE) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            projectId: "YOUR_PROJECT_ID",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- 2. NAVIGATION LOGIC ---
        const viewFeed = document.getElementById('viewFeed');
        const viewCreate = document.getElementById('viewCreate');

        document.getElementById('navCreateBtn').onclick = () => {
            if(!auth.currentUser) return alert("You must be logged in to create a quest!");
            viewCreate.classList.remove('hidden');
        };
        document.getElementById('closeCreateBtn').onclick = () => viewCreate.classList.add('hidden');

        // --- 3. AUTH LOGIC ---
        document.getElementById('loginBtn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        };

        auth.onAuthStateChanged(user => {
            const authSection = document.getElementById('authSection');
            if (user) {
                authSection.innerHTML = `<span class="text-sm font-bold mr-4">${user.displayName}</span><button onclick="auth.signOut()" class="text-gray-400">Log Out</button>`;
            } else {
                authSection.innerHTML = `<button id="loginBtn" class="bg-black text-white px-4 py-2 rounded-full text-sm font-medium">Log In</button>`;
                // Re-attach listener if re-rendered
                document.getElementById('loginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            }
        });

        // --- 4. DATA LOGIC ---
        document.getElementById('publishBtn').onclick = async () => {
            const title = document.getElementById('qTitle').value;
            const desc = document.getElementById('qDesc').value;
            const visibility = document.querySelector('input[name="visibility"]:checked').value;

            if(title && desc) {
                await db.collection("quests").add({
                    title, desc, visibility,
                    userId: auth.currentUser.uid,
                    author: auth.currentUser.displayName,
                    likes: 0,
                    dislikes: 0,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                viewCreate.classList.add('hidden');
                document.getElementById('qTitle').value = "";
                document.getElementById('qDesc').value = "";
            }
        };

        // --- 5. RENDER FEED ---
        db.collection("quests").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('questContainer');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const q = doc.data();
                if(q.visibility === 'private' && (!auth.currentUser || auth.currentUser.uid !== q.userId)) return;

                const card = document.createElement('div');
                card.className = "quest-card p-6 rounded-2xl shadow-sm";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-lg font-bold">${q.title}</h3>
                        <span class="text-xs bg-gray-100 px-2 py-1 rounded-md text-gray-500">By ${q.author}</span>
                    </div>
                    <p class="text-gray-600 mb-4">${q.desc}</p>
                    <div class="flex gap-4 border-t pt-4">
                        <button onclick="updateVote('${doc.id}', 'likes')" class="text-sm">👍 ${q.likes || 0}</button>
                        <button onclick="updateVote('${doc.id}', 'dislikes')" class="text-sm">👎 ${q.dislikes || 0}</button>
                        <button onclick="bookmark('${doc.id}')" class="text-sm ml-auto">🔖 Save</button>
                    </div>
                `;
                container.appendChild(card);
            });
        });

        window.updateVote = (id, type) => {
            if(!auth.currentUser) return alert("Login to vote!");
            const ref = db.collection("quests").doc(id);
            ref.update({ [type]: firebase.firestore.FieldValue.increment(1) });
        };
    </script>
</body>
</html>
