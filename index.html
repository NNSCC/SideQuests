<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Quest | Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #111827; overflow-x: hidden; }
        
        .quest-card { 
            background: white; 
            border: 1px solid #e5e7eb; 
            border-radius: 24px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .quest-card:hover { 
            border-color: #6366f1; 
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); 
        }

        /* Smooth Overlay Animation */
        .view-overlay { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.98);
        }

        .view-overlay.active { 
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .btn-primary {
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        input:focus, textarea:focus { outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <button id="navCreateBtn" class="text-indigo-600 font-bold text-sm tracking-tight hover:text-indigo-800 transition-colors">
                + CREATE QUEST
            </button>
            <h1 class="text-xl font-black tracking-tighter italic">SIDE QUEST</h1>
            <div id="authSection">
                <button id="loginBtn" class="btn-primary bg-black text-white px-5 py-2 rounded-full text-xs font-bold tracking-widest uppercase">
                    LOG IN
                </button>
            </div>
        </div>
    </nav>

    <main id="viewFeed" class="max-w-xl mx-auto py-10 px-4">
        <div id="questContainer" class="space-y-8">
            <div class="text-center py-20 text-gray-400">Initializing...</div>
        </div>
    </main>

    <section id="viewCreate" class="fixed inset-0 z-[60] bg-white p-6 view-overlay flex items-center justify-center">
        <div class="max-w-lg w-full h-full flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <button id="closeCreateBtn" class="text-gray-400 hover:text-black transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="6 18L18 6M6 6l12 12" /></svg>
                </button>
                <span class="text-xs font-bold text-gray-300 tracking-widest uppercase text-center">New Entry</span>
                <div class="w-6"></div>
            </div>
            <h2 class="text-4xl font-black mb-8 tracking-tighter">What's the quest?</h2>
            <div class="space-y-6 flex-grow">
                <input type="text" id="qTitle" placeholder="Title" class="w-full text-2xl font-bold p-0 border-none placeholder:text-gray-200">
                <textarea id="qDesc" placeholder="Description..." class="w-full text-lg p-0 border-none h-40 resize-none placeholder:text-gray-200"></textarea>
                <div class="flex items-center gap-6 py-4 border-t border-gray-50">
                    <label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="radio" name="visibility" value="public" checked> Public</label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="radio" name="visibility" value="private"> Private</label>
                </div>
            </div>
            <div class="pb-10">
                <button id="publishBtn" class="btn-primary w-full bg-black text-white p-5 rounded-2xl font-bold text-lg">Publish Quest</button>
            </div>
        </div>
    </section>

    <section id="viewAuth" class="fixed inset-0 z-[70] bg-white p-6 view-overlay flex items-center justify-center">
        <div class="max-w-lg w-full h-full flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <button id="closeAuthBtn" class="text-gray-400 hover:text-black transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="6 18L18 6M6 6l12 12" /></svg>
                </button>
                <span id="authModeTitle" class="text-[10px] font-bold text-gray-300 tracking-widest uppercase">Member Portal</span>
                <div class="w-6"></div>
            </div>
            <h2 id="authHeading" class="text-4xl font-black mb-8 tracking-tighter text-indigo-600">Create Account</h2>
            <div class="space-y-6 flex-grow">
                <div id="usernameField"><input type="text" id="authUsername" placeholder="Username" class="w-full text-xl font-bold border-b border-gray-100 pb-2 focus:border-indigo-600 transition-colors"></div>
                <div><input type="email" id="authEmail" placeholder="Email" class="w-full text-xl font-bold border-b border-gray-100 pb-2 focus:border-indigo-600 transition-colors"></div>
                <div><input type="password" id="authPassword" placeholder="Password" class="w-full text-xl font-bold border-b border-gray-100 pb-2 focus:border-indigo-600 transition-colors"></div>
            </div>
            <div class="pb-10">
                <button id="authSubmitBtn" class="btn-primary w-full bg-black text-white p-5 rounded-2xl font-bold text-lg">Submit</button>
                <button id="toggleAuthMode" class="w-full mt-4 text-xs font-bold text-gray-400 uppercase tracking-widest text-center hover:text-black transition-colors">Already have an account? Log In</button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="app.js"></script>
</body>
</html>
